<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrepPal — Quizzes</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body data-page-id="quizzes" data-page-title="Quizzes" data-page-subtitle="Take practice quizzes to measure your progress.">
    <div id="view-app">
      <div class="app-shell">
        <Sidebar
          :nav-items="navItems"
          :active-nav="activeNav"
          @update:activeNav="activeNav = $event"
          :user-name="userName"
          :initials="initials"
          @logout="logout"
        />

        <main class="main">
          <div class="greeting">
            <h1>{{ pageTitle }}</h1>
            <p>{{ pageSubtitle }}</p>
          </div>

          <div class="section-title">Available Quizzes</div>
          <div class="quick-actions">
            <div class="qa-card" v-for="q in quizzes" :key="q.id">
              <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
                <div>
                  <div style="font-weight:700; margin-bottom:6px;">{{ q.title }}</div>
                  <div style="font-size:.86rem; color:var(--muted);">{{ q.desc }} • {{ q.questions }} questions • {{ q.time }}</div>
                </div>
                <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
                  <button class="btn-primary" @click="startQuiz(q.id)">Start</button>
                  <div style="font-size:.78rem; color:var(--muted);">{{ q.difficulty }}</div>
                </div>
              </div>
            </div>
          </div>

          <div style="margin-top:18px;" class="card">
            <div class="section-title">Quiz History</div>
            <p style="color:var(--muted); margin-top:8px;">No recent attempts yet — take a quiz to see progress here.</p>
          </div>
        </main>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../../view-layout.js"></script>
  </body>
</html>
