<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrepPal — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body data-page-id="dashboard" data-page-title="Dashboard" data-page-subtitle="Welcome back! Here's your study overview.">
    <div id="view-app">
      <div class="app-shell">
        <Sidebar
          :nav-items="navItems"
          :active-nav="activeNav"
          @update:activeNav="activeNav = $event"
          :user-name="userName"
          :initials="initials"
          @logout="logout"
        />

        <main class="main">
          <div class="topbar">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input type="text" placeholder="Search notes, quizzes, flashcards…" />
            </div>
            <div class="notif-btn">🔔<span class="notif-dot"></span></div>
            <div class="topbar-avatar">{{ initials }}</div>
          </div>

          <div class="greeting">
            <h1>{{ pageTitle }}</h1>
            <p>{{ pageSubtitle }}</p>
          </div>

          <div class="stats-row">
            <div class="stat-card" v-for="s in stats" :key="s.label">
              <div class="stat-top">
                <div class="stat-icon" :style="{ background: s.bg }">{{ s.icon }}</div>
                <span class="stat-badge" :style="{ background: s.bg, color: s.color }">{{ s.change }}</span>
              </div>
              <div class="stat-val">{{ s.value }}</div>
              <div class="stat-label">{{ s.label }}</div>
            </div>
          </div>

          <div class="section-title">Quick Actions</div>
          <div class="quick-actions">
            <div class="qa-card" v-for="q in quickActions" :key="q.name">
              <div class="qa-icon">{{ q.icon }}</div>
              <div class="qa-name">{{ q.name }}</div>
              <div class="qa-desc">{{ q.desc }}</div>
            </div>
          </div>

          <div class="bottom-grid">
            <div class="card">
              <div class="section-title">Recent Activity</div>
              <div class="activity-list">
                <div class="activity-item" v-for="a in activity" :key="a.title">
                  <div class="act-icon" :style="{ background: a.bg }">{{ a.icon }}</div>
                  <div>
                    <div class="act-title">{{ a.title }}</div>
                    <div class="act-sub">{{ a.sub }}</div>
                  </div>
                  <div class="act-time">{{ a.time }}</div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="section-title">Upcoming Deadlines</div>
              <div class="upcoming-list">
                <div
                  class="upcoming-item"
                  v-for="u in upcoming"
                  :key="u.name"
                  :class="u.color"
                >
                  <span class="upcoming-dot" :style="{ background: u.dotColor }"></span>
                  <div>
                    <div class="upcoming-name">{{ u.name }}</div>
                    <div class="upcoming-date">{{ u.date }}</div>
                  </div>
                  <span class="upcoming-badge" :style="{ background: u.badgeBg, color: u.dotColor }">
                    {{ u.tag }}
                  </span>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../../view-layout.js"></script>
  </body>
</html>
